<style id="dark-theme-styles"></style>
<style>
  .theme-toggle {
    background: none;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    padding: 4px 8px;
    font-size: 16px;
    position: fixed;
    top: 10px;
    right: 14px;
    z-index: 1000;
  }
</style>
<script>
  var darkCSS = [
    "body { background: #1e1e2e; color: #cdd6f4; }",
    ".side-bar { background: #181825; border-color: #313244; }",
    ".main-content { background: #1e1e2e; }",
    ".site-title { color: #cdd6f4; }",
    ".nav-list .nav-list-item a { color: #bac2de; }",
    ".nav-list .nav-list-item a:hover { color: #f5e0dc; background: #313244; }",
    ".nav-list .nav-list-item .nav-list-link.active { color: #f5e0dc; background: #313244; }",
    "a { color: #89b4fa; }",
    "a:hover { color: #b4befe; }",
    "h1, h2, h3, h4 { color: #cdd6f4; }",
    "table th { background: #313244; color: #cdd6f4; }",
    "table td { border-color: #45475a; }",
    "code { background: #313244; color: #f38ba8; }",
    "pre { background: #181825; }",
    "pre code { color: #cdd6f4; background: #181825; }",
    "blockquote { border-left-color: #585b70; }",
    "hr { border-color: #45475a; }",
    ".search-input { background: #313244; color: #cdd6f4; border-color: #45475a; }",
    ".search-label { color: #a6adc8; }",
    ".site-footer { color: #a6adc8; }",
    "strong { color: #cdd6f4; }",
    ".theme-toggle { border-color: #585b70; color: #cdd6f4; }"
  ].join(" ");

  function applyTheme(dark) {
    document.getElementById("dark-theme-styles").textContent = dark ? darkCSS : "";
  }

  // Apply saved preference immediately (before DOM ready)
  if (localStorage.getItem("jtd-theme") === "dark") applyTheme(true);

  document.addEventListener("DOMContentLoaded", function() {
    var btn = document.createElement("button");
    btn.className = "theme-toggle";
    btn.setAttribute("aria-label", "Toggle dark mode");
    var isDark = localStorage.getItem("jtd-theme") === "dark";
    btn.textContent = isDark ? "\u2600\uFE0F" : "\uD83C\uDF19";
    btn.addEventListener("click", function() {
      isDark = !isDark;
      applyTheme(isDark);
      localStorage.setItem("jtd-theme", isDark ? "dark" : "light");
      btn.textContent = isDark ? "\u2600\uFE0F" : "\uD83C\uDF19";
    });
    document.body.appendChild(btn);
  });
</script>
