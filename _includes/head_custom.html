<style>
  .theme-toggle {
    background: none;
    border: 1px solid #959396;
    border-radius: 4px;
    cursor: pointer;
    padding: 4px 8px;
    font-size: 14px;
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 100;
    color: inherit;
  }
</style>
<link id="jtd-dark-css" rel="stylesheet" href="" disabled>
<script>
  (function() {
    // Build the dark CSS URL from the existing light CSS URL pattern
    var lightLink = document.querySelector('link[href*="just-the-docs"]');
    var darkUrl = "";
    if (lightLink) {
      darkUrl = lightLink.href.replace("just-the-docs-light", "just-the-docs-dark")
                              .replace("just-the-docs-default", "just-the-docs-dark");
    }
    var darkLink = document.getElementById("jtd-dark-css");
    if (darkUrl) darkLink.href = darkUrl;

    var saved = localStorage.getItem("jtd-theme");
    if (saved === "dark" && darkLink) {
      darkLink.disabled = false;
      if (lightLink) lightLink.disabled = true;
    }

    document.addEventListener("DOMContentLoaded", function() {
      var btn = document.createElement("button");
      btn.className = "theme-toggle";
      btn.setAttribute("aria-label", "Toggle dark mode");
      var isDark = saved === "dark";
      btn.textContent = isDark ? "\u2600\uFE0F" : "\uD83C\uDF19";
      btn.addEventListener("click", function() {
        var nowDark = !darkLink.disabled;
        if (nowDark) {
          darkLink.disabled = true;
          if (lightLink) lightLink.disabled = false;
          localStorage.setItem("jtd-theme", "light");
          btn.textContent = "\uD83C\uDF19";
        } else {
          darkLink.disabled = false;
          if (lightLink) lightLink.disabled = true;
          localStorage.setItem("jtd-theme", "dark");
          btn.textContent = "\u2600\uFE0F";
        }
      });
      document.body.appendChild(btn);
    });
  })();
</script>
